<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Professional Video Poker Expected Value Optimizer - Analyze hands with exact combinatorial precision">
    <meta name="theme-color" content="#1a1a1a">
    <title>Nick Orr's Video Poker Analyzer - Video Poker Expected Value Optimizer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%231a1a1a' width='180' height='180' rx='40'/><text x='90' y='135' font-size='120' font-weight='bold' text-anchor='middle' fill='%234a9eff'>♠</text></svg>">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231a1a1a' width='100' height='100'/><text x='50' y='70' font-size='60' font-weight='bold' text-anchor='middle' fill='%23fff'>♠</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <div class="header-content">
                <h1>♠ Nick Orr's Video Poker Analyzer</h1>
                <p class="subtitle">Exact Expected Value Analysis</p>
                <div id="offlineReadyBadge" class="offline-ready-badge" aria-live="polite">Offline Ready</div>
            </div>
        </header>

        <main class="main-content">
            <!-- Analyzer Tab -->
            <div id="game-selector-container" class="section-container game-selector-section"></div>
            <div id="card-input-container" class="section-container card-input-section"></div>
            <div id="paytable-container" class="section-container paytable-section"></div>
            <div id="results-container" class="section-container results-section"></div>

            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="loading-overlay">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Analyzing hand...</p>
                    <p id="loadingProgress" class="loading-progress">Analyzing 32 holds...</p>
                </div>
            </div>
        </main>

        <footer class="app-footer">
            <p>Nick Orr's Video Poker Analyzer v1.0 • Deterministic combinatorial analysis • Works fully offline</p>
            <p style="font-size: 12px; color: #aeb7c2;">For entertainment purposes only. Results for strategic analysis.</p>
        </footer>
    </div>

    <!-- Engine Scripts -->
    <script src="engine/evaluator.js"></script>
    <script src="engine/combinatorics.js"></script>
    <script src="engine/evCalculator.js"></script>
    <script src="engine/multiHandAnalysis.js"></script>

    <!-- UI Component Scripts -->
    <script src="ui/gameSelector.js"></script>
    <script src="ui/cardInput.js"></script>
    <script src="ui/paytableEditor.js"></script>
    <script src="ui/resultsView.js"></script>

    <!-- Main App Script -->
    <script src="main.js"></script>

    <!-- Service Worker Registration -->
    <script>
        function showOfflineReadyBadge() {
            const badge = document.getElementById('offlineReadyBadge');
            if (badge) {
                badge.classList.add('visible');
            }
        }

        // Register service worker on http/https for offline support.
        if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
            window.addEventListener('load', () => {
                navigator.serviceWorker.addEventListener('message', (event) => {
                    if (event.data && event.data.type === 'OFFLINE_READY') {
                        showOfflineReadyBadge();
                    }
                });

                navigator.serviceWorker.register('service-worker.js').then(registration => {
                    console.log('Service Worker registered:', registration.scope);

                    // On already-cached installs, ready is an immediate reliable signal.
                    navigator.serviceWorker.ready.then(() => {
                        showOfflineReadyBadge();
                    });
                }).catch(error => {
                    console.log('Service Worker registration failed:', error);
                });
            });
        } else {
            console.log('Service Worker unavailable in this context');
        }
    </script>
</body>
</html>
